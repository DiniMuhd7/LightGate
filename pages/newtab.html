<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>New Tab — LightGate</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f2f5;
      --bg-card: #ffffff;
      --bg-input: #ffffff;
      --text: #1a1a1a;
      --text-sub: #555555;
      --text-muted: #888888;
      --accent: #1a73e8;
      --accent-hover: #1558b0;
      --border: #d0d3d8;
      --shadow: rgba(0,0,0,0.08);
      --radius: 16px;
      --radius-sm: 10px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a1a;
        --bg-card: #2e2e2e;
        --bg-input: #2e2e2e;
        --text: #e8eaed;
        --text-sub: #bdc1c6;
        --text-muted: #808080;
        --accent: #4a9eff;
        --accent-hover: #6cb4ff;
        --border: #3a3a3a;
        --shadow: rgba(0,0,0,0.3);
      }
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
    }

    .page {
      min-height: 100%;
      padding: 32px 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 28px;
      max-width: 520px;
      margin: 0 auto;
    }

    /* ─── Greeting ──── */
    .greeting {
      text-align: center;
    }

    .greeting .time {
      font-size: 48px;
      font-weight: 300;
      color: var(--text);
      letter-spacing: -1px;
      line-height: 1;
    }

    .greeting .date {
      font-size: 14px;
      color: var(--text-muted);
      margin-top: 6px;
    }

    /* ─── Search ──── */
    .search-wrap {
      display: flex;
      align-items: center;
      background: var(--bg-input);
      border: 1.5px solid var(--border);
      border-radius: 999px;
      padding: 0 16px;
      height: 48px;
      gap: 10px;
      box-shadow: 0 2px 8px var(--shadow);
    }

    .search-wrap:focus-within {
      border-color: var(--accent);
    }

    .search-icon {
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .search-icon svg {
      width: 18px;
      height: 18px;
    }

    .search-input {
      flex: 1;
      border: none;
      background: transparent;
      font-family: var(--font);
      font-size: 15px;
      color: var(--text);
      outline: none;
    }

    .search-input::placeholder {
      color: var(--text-muted);
    }

    .search-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      background: var(--accent);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .search-btn:active {
      background: var(--accent-hover);
    }

    .search-btn svg {
      width: 15px;
      height: 15px;
      color: #fff;
    }

    /* ─── Quick Access ──── */
    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 10px;
    }

    .quick-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .quick-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
      cursor: pointer;
      text-decoration: none;
      padding: 4px 2px;
      border-radius: 10px;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
      min-width: 0;
      overflow: hidden;
    }

    .quick-item:active {
      background: rgba(0,0,0,0.06);
    }

    @media (prefers-color-scheme: dark) {
      .quick-item:active {
        background: rgba(255,255,255,0.07);
      }
    }

    .quick-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: var(--bg-card);
      box-shadow: 0 2px 8px var(--shadow);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .quick-icon img {
      width: 28px;
      height: 28px;
      border-radius: 4px;
    }

    .quick-icon .initials {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
    }

    .quick-label {
      font-size: 11px;
      color: var(--text-sub);
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      width: 100%;
    }

    /* ─── Tips ──── */
    .tips {
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.6;
    }
  </style>
</head>
<body>
<div class="page">

  <!-- Greeting + Clock -->
  <div class="greeting">
    <div class="time" id="clock" aria-live="off">--:--</div>
    <div class="date" id="dateline" aria-live="off"></div>
  </div>

  <!-- Search Bar -->
  <form class="search-wrap" id="search-form" role="search" aria-label="Web search">
    <span class="search-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <circle cx="11" cy="11" r="8"/>
        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35"/>
      </svg>
    </span>
    <input
      type="search"
      class="search-input"
      id="search-input"
      placeholder="Search or enter URL"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
      aria-label="Search the web"
    >
    <button type="submit" class="search-btn" aria-label="Go">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M13 5l7 7-7 7M5 12h15"/>
      </svg>
    </button>
  </form>

  <!-- Quick Access Grid -->
  <div>
    <div class="section-title">Quick Access</div>
    <div class="quick-grid" role="list" aria-label="Quick access sites" id="quick-grid"></div>
  </div>

  <!-- Tip -->
  <p class="tips">Tap the address bar to search or navigate · Long-press a tab to close it</p>

</div>

<script>
  /* ─── Clock ─────────────────────────────────────────── */
  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    document.getElementById('dateline').textContent =
      now.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric' });
  }
  updateClock();
  setInterval(updateClock, 1000);

  /* ─── Quick Access Sites ─────────────────────────────── */
  const SITES = [
    { name: 'Google',     url: 'https://www.google.com',     color: '#ea4335', letter: 'G' },
    { name: 'YouTube',    url: 'https://www.youtube.com',    color: '#ff0000', letter: 'Y' },
    { name: 'Wikipedia',  url: 'https://www.wikipedia.org',  color: '#3366cc', letter: 'W' },
    { name: 'GitHub',     url: 'https://github.com',         color: '#24292e', letter: 'G' },
    { name: 'Reddit',     url: 'https://www.reddit.com',     color: '#ff4500', letter: 'R' },
    { name: 'Twitter',    url: 'https://twitter.com',        color: '#1da1f2', letter: 'T' },
    { name: 'Amazon',     url: 'https://www.amazon.com',     color: '#ff9900', letter: 'A' },
    { name: 'DuckDuckGo', url: 'https://duckduckgo.com',     color: '#de5833', letter: 'D' },
  ];

  const grid = document.getElementById('quick-grid');
  SITES.forEach(site => {
    const a = document.createElement('a');
    a.className = 'quick-item';
    a.href = '#';
    a.setAttribute('role', 'listitem');
    a.setAttribute('aria-label', site.name);

    const faviconUrl = `https://www.google.com/s2/favicons?sz=64&domain=${encodeURIComponent(site.url)}`;

    a.innerHTML = `
      <div class="quick-icon">
        <img src="${faviconUrl}" alt="" width="28" height="28"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <span class="initials" style="display:none;color:${site.color}">${site.letter}</span>
      </div>
      <span class="quick-label">${site.name}</span>`;

    a.addEventListener('click', e => {
      e.preventDefault();
      // Navigate parent frame (LightGate app)
      if (window.parent && window.parent !== window) {
        window.parent.App.navigateTo(site.url);
      } else {
        window.location.href = site.url;
      }
    });

    grid.appendChild(a);
  });

  /* ─── Search Form ────────────────────────────────────── */
  document.getElementById('search-form').addEventListener('submit', e => {
    e.preventDefault();
    const query = document.getElementById('search-input').value.trim();
    if (!query) return;

    // Try to detect URL vs search
    let url;
    if (/^https?:\/\//i.test(query)) {
      url = query;
    } else if (/^[a-zA-Z0-9-]+(\.[a-zA-Z]{2,})(\/.*)?$/.test(query)) {
      url = 'https://' + query;
    } else {
      // Use search engine from parent settings if available
      let engine = 'https://duckduckgo.com/?q=';
      try {
        if (window.parent && window.parent.Settings) {
          const engineKey = window.parent.Settings.get('searchEngine');
          const engines = window.parent.Settings.SEARCH_ENGINES;
          if (engines && engines[engineKey]) {
            engine = engines[engineKey].url;
          }
        }
      } catch { /* cross-origin */ }
      url = engine + encodeURIComponent(query);
    }

    // Reconstruct URL through the browser's URL parser to break taint chain
    // and verify it uses a safe protocol (http, https, ftp only)
    let safeUrl;
    try {
      const parsed = new URL(url);
      if (!['https:', 'http:', 'ftp:'].includes(parsed.protocol)) return;
      safeUrl = parsed.href;
    } catch { return; }

    if (window.parent && window.parent !== window) {
      window.parent.App.navigateTo(safeUrl);
    } else {
      window.location.assign(safeUrl);
    }
  });
</script>
</body>
</html>
