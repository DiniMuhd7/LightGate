<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>LightGate</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/browser.css">
</head>
<body>
  <!--
    allow-same-origin is required so that lifegate.dshub.com.ng can access its own
    cookies and storage. Because the shell page and the iframe are on different origins,
    this flag does NOT create a sandbox-escape risk; the browser's same-origin policy
    still isolates the two origins from each other.
  -->
  <iframe
    id="browser-frame"
    src="https://lifegate.dshub.com.ng"
    title="LightGate Browser"
    allow="autoplay; camera; microphone; geolocation; fullscreen"
    sandbox="allow-forms allow-modals allow-orientation-lock allow-pointer-lock allow-popups allow-popups-to-escape-sandbox allow-presentation allow-same-origin allow-scripts allow-top-navigation-by-user-activation"
  ></iframe>

  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(function (err) {
        console.warn('Service worker registration failed:', err);
      });
    }
  </script>
</body>
</html>
