<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1a73e8" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#242424" media="(prefers-color-scheme: dark)">
  <meta name="description" content="LightGate — Lightweight Mobile Browser">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="LightGate">
  <title>LightGate</title>

  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/browser.css">
</head>
<body>

<div id="app" role="application" aria-label="LightGate Browser">

  <!-- ─── Progress Bar ─────────────────────────────────── -->
  <div id="progress-bar" role="progressbar" aria-label="Page loading progress" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>

  <!-- ─── Top Toolbar ──────────────────────────────────── -->
  <header id="toolbar" role="toolbar" aria-label="Browser controls">

    <!-- Back -->
    <button id="btn-back" class="nav-btn" aria-label="Go back" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
      </svg>
    </button>

    <!-- Forward -->
    <button id="btn-forward" class="nav-btn" aria-label="Go forward" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
      </svg>
    </button>

    <!-- Reload -->
    <button id="btn-reload" class="nav-btn" aria-label="Reload page" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
      </svg>
    </button>

    <!-- Address Bar -->
    <div id="address-bar-wrap" role="search" aria-label="Address bar">
      <!-- Lock icon (shown for https) -->
      <span class="lock-icon" id="lock-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M7 11V7a5 5 0 0110 0v4"/>
        </svg>
      </span>
      <input
        type="url"
        id="url-input"
        inputmode="url"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
        placeholder="Search or enter URL"
        aria-label="Address bar — type a URL or search query"
      >
      <button id="url-clear-btn" aria-label="Clear address bar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <!-- Menu -->
    <button id="menu-btn" class="nav-btn" aria-label="Browser menu" aria-expanded="false" aria-haspopup="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true">
        <circle cx="12" cy="5" r="1.2" fill="currentColor"/>
        <circle cx="12" cy="12" r="1.2" fill="currentColor"/>
        <circle cx="12" cy="19" r="1.2" fill="currentColor"/>
      </svg>
    </button>

  </header>

  <!-- ─── Browser Content Area ─────────────────────────── -->
  <main id="browser-area" aria-label="Browser content area">

    <!-- Loading spinner overlay -->
    <div id="browser-loading" aria-hidden="true">
      <div class="spinner" role="status" aria-label="Loading"></div>
    </div>

    <!-- New Tab layer -->
    <iframe
      id="newtab-layer"
      src="pages/newtab.html"
      title="New tab page"
      aria-label="New tab page"
      sandbox="allow-forms allow-scripts allow-same-origin allow-popups"
    ></iframe>

    <!-- Tab iframes are created dynamically by app.js -->
  </main>

  <!-- ─── Bottom Tab Bar ───────────────────────────────── -->
  <nav id="tab-bar" role="tablist" aria-label="Browser tabs">
    <button id="new-tab-btn" aria-label="Open new tab" title="New Tab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="22" height="22" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 5v14M5 12h14"/>
      </svg>
    </button>
  </nav>

  <!-- ─── Menu Dropdown ────────────────────────────────── -->
  <div id="menu-panel" role="menu" aria-label="Browser menu">
    <button class="menu-item" id="menu-bookmark-btn" role="menuitem" aria-label="Add bookmark">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path id="bookmark-icon" stroke-linecap="round" stroke-linejoin="round"
          d="M17.593 3.322c1.1.128 1.907 1.077 1.907 2.185V21L12 17.25 4.5 21V5.507c0-1.108.806-2.057 1.907-2.185a48.507 48.507 0 0111.186 0z"/>
      </svg>
      Add Bookmark
    </button>
    <div class="menu-divider" role="separator"></div>
    <button class="menu-item" id="menu-bookmarks-btn" role="menuitem" aria-label="Open bookmarks">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M3 6.75A.75.75 0 013.75 6h16.5a.75.75 0 010 1.5H3.75A.75.75 0 013 6.75zM3 12a.75.75 0 01.75-.75h16.5a.75.75 0 010 1.5H3.75A.75.75 0 013 12zm0 5.25a.75.75 0 01.75-.75h10.5a.75.75 0 010 1.5H3.75a.75.75 0 01-.75-.75z"/>
      </svg>
      Bookmarks
    </button>
    <button class="menu-item" id="menu-history-btn" role="menuitem" aria-label="Open history">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      History
    </button>
    <div class="menu-divider" role="separator"></div>
    <button class="menu-item" id="menu-settings-btn" role="menuitem" aria-label="Open settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z"/>
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
      </svg>
      Settings
    </button>
  </div>

  <!-- ─── Bookmarks Panel ───────────────────────────────── -->
  <div id="bookmarks-panel-overlay" class="panel-overlay" role="presentation" aria-hidden="true">
    <aside id="bookmarks-panel" class="panel" role="complementary" aria-label="Bookmarks">
      <div class="panel-header">
        <h2>Bookmarks</h2>
        <button class="panel-close-btn" aria-label="Close bookmarks panel">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div class="panel-content" role="list" aria-label="Saved bookmarks"></div>
    </aside>
  </div>

  <!-- ─── History Panel ────────────────────────────────── -->
  <div id="history-panel-overlay" class="panel-overlay" role="presentation" aria-hidden="true">
    <aside id="history-panel" class="panel" role="complementary" aria-label="Browsing History">
      <div class="panel-header">
        <h2>History</h2>
        <button class="panel-close-btn" aria-label="Close history panel">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div class="panel-content" role="list" aria-label="Browsing history"></div>
      <div class="panel-footer">
        <button id="clear-history-btn" class="btn btn-danger btn-full" aria-label="Clear all browsing history">
          Clear History
        </button>
      </div>
    </aside>
  </div>

  <!-- ─── Settings Panel ───────────────────────────────── -->
  <div id="settings-panel-overlay" class="panel-overlay" role="presentation" aria-hidden="true">
    <aside id="settings-panel" class="panel" role="complementary" aria-label="Settings">
      <div class="panel-header">
        <h2>Settings</h2>
        <button class="panel-close-btn" aria-label="Close settings panel">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div class="panel-content">

        <!-- Search Engine -->
        <div class="settings-section">
          <div class="settings-section-title">Search</div>
          <div class="settings-row">
            <label class="settings-label" for="setting-search-engine">Default Search Engine</label>
            <select id="setting-search-engine" class="settings-select" aria-label="Choose default search engine">
              <option value="duckduckgo">DuckDuckGo</option>
              <option value="google">Google</option>
              <option value="bing">Bing</option>
            </select>
          </div>
        </div>

        <!-- Privacy -->
        <div class="settings-section">
          <div class="settings-section-title">Privacy</div>
          <div class="settings-row">
            <div>
              <div class="settings-label">JavaScript</div>
              <div class="settings-sublabel">Enable JS in pages (may affect security)</div>
            </div>
            <label class="toggle-switch" aria-label="Toggle JavaScript">
              <input type="checkbox" id="setting-js-toggle" checked aria-label="Enable JavaScript">
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>

        <!-- Appearance -->
        <div class="settings-section">
          <div class="settings-section-title">Appearance</div>
          <div class="settings-row">
            <label class="settings-label" for="setting-theme">Theme</label>
            <select id="setting-theme" class="settings-select" aria-label="Choose app theme">
              <option value="auto">System Default</option>
              <option value="light">Light</option>
              <option value="dark">Dark</option>
            </select>
          </div>
        </div>

        <!-- Data -->
        <div class="settings-section">
          <div class="settings-section-title">Data</div>
          <div class="settings-row">
            <div class="settings-label">Clear Browsing Data</div>
            <button id="setting-clear-data" class="btn btn-danger" aria-label="Clear all browsing data">Clear</button>
          </div>
        </div>

        <!-- About -->
        <div class="settings-section">
          <div class="settings-section-title">About</div>
          <div class="settings-row">
            <span class="settings-label">Version</span>
            <span style="font-size:var(--font-size-sm);color:var(--color-text-muted)">1.0.0</span>
          </div>
          <div class="settings-row">
            <span class="settings-label">LightGate</span>
            <span style="font-size:var(--font-size-xs);color:var(--color-text-muted)">Lightweight Mobile Browser</span>
          </div>
        </div>

      </div>
    </aside>
  </div>

  <!-- ─── Toast ────────────────────────────────────────── -->
  <div id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

</div><!-- #app -->

<script src="js/settings.js"></script>
<script src="js/bookmarks.js"></script>
<script src="js/history.js"></script>
<script src="js/app.js"></script>
<script>
  /* Wire up remaining events that need DOM + all modules */
  document.addEventListener('DOMContentLoaded', () => {
    // Clear history button
    const clearHistBtn = document.getElementById('clear-history-btn');
    if (clearHistBtn) {
      clearHistBtn.addEventListener('click', () => {
        if (confirm('Clear all browsing history?')) {
          History.clear();
          History.renderPanel();
          App.showToast('History cleared');
        }
      });
    }

    // Lock icon visibility
    const urlInput = document.getElementById('url-input');
    const lockIcon = document.getElementById('lock-icon');
    urlInput.addEventListener('input', () => {
      if (lockIcon) {
        const isHttps = urlInput.value.startsWith('https://');
        lockIcon.classList.toggle('insecure', !isHttps && urlInput.value.length > 0);
      }
    });
  });
</script>

</body>
</html>
